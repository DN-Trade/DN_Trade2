<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DN_Trade | Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Noto+Sans+TC:wght@500;700&display=swap');
        :root { --safe-bottom: env(safe-area-inset-bottom); }
        html, body { position: fixed; width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; }
        body { color: #eee; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Noto Sans TC", sans-serif; margin: 0; display: flex; flex-direction: column; }
        .neon-green { color: #39FF14; }
        .drawer { position: fixed; top: 0; bottom: calc(85px + var(--safe-bottom)); width: 85%; background: #0a0a0a; z-index: 100; transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: 0 -2px 8px rgba(0,0,0,0.3); }
        #left-drawer { left: 0; transform: translateX(-100%); border-right: 1px solid #1a1a1a; }
        #right-drawer { right: 0; transform: translateX(100%); border-left: 1px solid #1a1a1a; }
        #left-drawer.active { transform: translateX(0); }
        #right-drawer.active { transform: translateX(0); }
        @media (min-width: 1024px) { .drawer { position: static; width: auto; transform: none !important; box-shadow: none; } }
        .nav-item { color: #555; font-size: 15px; font-weight: 700; cursor: pointer; padding: 8px 0; position: relative; transition: 0.3s; }
        .nav-item.active { color: #39FF14; }
        .nav-item.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 2.5px; background: #39FF14; border-radius: 2px; }
        #chart-container { height: 62vh; border-bottom: 1px solid #111; touch-action: auto; background: #000; }
        @media (min-width: 1024px) { #chart-container { height: 100%; } }
        .mobile-bottom-nav { display: none; position: fixed; bottom: 0; width: 100%; height: calc(80px + var(--safe-bottom)); background: rgba(8, 8, 8, 0.98); backdrop-filter: blur(25px); border-top: 1px solid #1a1a1a; z-index: 200; }
        @media (max-width: 1024px) { .mobile-bottom-nav { display: flex; justify-content: space-around; align-items: center; } }
        .btn-nav { font-size: 17px; font-weight: 700; color: #444; letter-spacing: 0.05em; transition: 0.2s; padding: 10px 15px; }
        .btn-nav.active { color: #39FF14; }
        .list-item { background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 10px; padding: 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .list-item.active { border-color: #39FF14; background: rgba(57, 255, 20, 0.03); }
        input { background: #111; border: 1px solid #222; color: #fff; padding: 14px; border-radius: 10px; width: 100%; font-size: 15px; outline: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .price-update { animation: pulse 0.5s ease-out; }
        @keyframes pulse { 0% { color: #FFD700; } 100% { color: #39FF14; } }
    </style>
</head>
<body>
    <header class="h-16 flex items-center justify-between px-6 border-b border-white/5 bg-black z-50">
        <div class="flex items-center gap-8">
            <div onclick="window.location.reload()" class="text-2xl font-bold tracking-tighter cursor-pointer active:opacity-50 transition">
                <span class="neon-green">DN</span><span class="text-white">_Trade</span>
            </div>
            <nav class="flex gap-6 overflow-x-auto no-scrollbar" id="main-nav">
                <div class="nav-item active" data-cat="forex">外匯</div>
                <div class="nav-item" data-cat="crypto">加密</div>
                <div class="nav-item" data-cat="stock">股市</div>
            </nav>
        </div>
    </header>

    <main class="flex-1 grid grid-cols-12 overflow-hidden relative">
        <aside id="left-drawer" class="col-span-12 lg:col-span-2 drawer lg:block">
            <div class="p-8 border-b border-white/5">
                <span class="text-[11px] font-bold text-orange-500 uppercase tracking-[0.2em] mb-3 block">Bitopro Price</span>
                <div id="bito-last" class="text-4xl font-mono neon-green tracking-tighter">--.---</div>
            </div>
            <div class="p-8 border-b border-white/5">
                <span class="text-[11px] font-bold text-blue-500 uppercase tracking-[0.2em] mb-3 block">Max Price</span>
                <div id="max-last" class="text-4xl font-mono text-blue-400 tracking-tighter">--.---</div>
            </div>
        </aside>

        <section id="chart-container" class="col-span-12 lg:col-span-8 overflow-hidden relative">
            <div id="tv_main" class="h-full w-full"></div>
        </section>

        <aside id="right-drawer" class="col-span-12 lg:col-span-2 drawer lg:flex flex-col">
            <div class="p-5 text-[11px] text-gray-500 font-bold border-b border-white/5 flex justify-between uppercase tracking-widest">
                Watchlist <span>Sort</span>
            </div>
            <div id="watchlist" class="flex-1 overflow-y-auto p-4 no-scrollbar"></div>
            <div class="p-5 border-t border-white/5">
                <input type="text" id="new-sym" placeholder="輸入代碼搜尋 (例: BTCUSDT)">
            </div>
        </aside>
    </main>

    <div class="mobile-bottom-nav">
        <button onclick="toggleDrawer('left')" id="btn-left" class="btn-nav">實時匯率</button>
        <button onclick="closeDrawers()" id="btn-chart" class="btn-nav active">交易圖表</button>
        <button onclick="toggleDrawer('right')" id="btn-right" class="btn-nav">自選清單</button>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const STORAGE_KEY = 'DN_Trade_V19_Ultimate';
        const defaultLists = {
            forex: ['FX_IDC:USDTWD', 'FX_IDC:USDCNY'],
            crypto: ['BINANCE:BTCUSDT', 'BINANCE:ETHUSDT'],
            stock: ['NASDAQ:NVDA', 'NASDAQ:TSLA']
        };

        let currentCat = 'forex';
        let storage = JSON.parse(localStorage.getItem(STORAGE_KEY)) || defaultLists;
        let tvWidget = null;
        let maxWs = null; // WebSocket 連接

        window.onload = () => {
            loadChart('FX_IDC:USDTWD'); 
            initMAXWebSocket(); // 初始化 WebSocket 而不是 REST API 輪詢
            renderWatchlist(false);
        };

        // ===== 新增：MAX WebSocket 實時數據 =====
        function initMAXWebSocket() {
            maxWs = new WebSocket('wss://max-stream.maicoin.com/ws');
            
            maxWs.onopen = () => {
                console.log('MAX WebSocket connected');
                // 訂閱 USDT/TWD 和 BTC/TWD
                maxWs.send(JSON.stringify({
                    action: 'subscribe',
                    subscriptions: [
                        { channel: 'tickers', markets: ['usdttwd', 'btctwd'] }
                    ]
                }));
            };

            maxWs.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    
                    // 處理 ticker 更新
                    if (data.channel === 'tickers' && data.data) {
                        data.data.forEach(ticker => {
                            if (ticker.market === 'usdttwd') {
                                const priceEl = document.getElementById('max-last');
                                priceEl.classList.remove('price-update');
                                void priceEl.offsetWidth; // 觸發重排
                                priceEl.classList.add('price-update');
                                priceEl.innerText = parseFloat(ticker.last).toFixed(3);
                            }
                        });
                    }
                } catch (e) {
                    console.log('Error parsing MAX WebSocket message:', e);
                }
            };

            maxWs.onerror = (error) => {
                console.error('MAX WebSocket error:', error);
            };

            maxWs.onclose = () => {
                console.log('MAX WebSocket closed, reconnecting in 3s...');
                setTimeout(initMAXWebSocket, 3000); // 自動重連
            };
        }

        // ===== 保留舊的 Bitopro REST API（可選） =====
        async function fetchBitoproPrice() {
            const bitoUrl = 'https://api.bitopro.com/v3/tickers/usdt_twd';
            try {
                const res = await fetch(bitoUrl);
                const json = await res.json();
                if (json && json.data && json.data.lastPrice) {
                    const priceEl = document.getElementById('bito-last');
                    priceEl.classList.remove('price-update');
                    void priceEl.offsetWidth;
                    priceEl.classList.add('price-update');
                    priceEl.innerText = parseFloat(json.data.lastPrice).toFixed(3);
                }
            } catch (e) {
                console.log("BitoPro fetch failed");
            }
        }
        
        // 啟動 Bitopro 輪詢（可選，如果想保留）
        fetchBitoproPrice();
        setInterval(fetchBitoproPrice, 5000);

        function loadChart(symbol) {
            tvWidget = new TradingView.widget({
                "autosize": true,
                "symbol": symbol,
                "interval": "15",
                "theme": "dark",
                "style": "1",
                "locale": "zh_TW",
                "container_id": "tv_main",
                "allow_symbol_change": true,
                "hide_side_toolbar": false,
                "enable_publishing": false,
                "backgroundColor": "rgba(0, 0, 0, 1)",
                "gridColor": "rgba(25, 25, 25, 1)",
                "toolbar_bg": "#000000"
            });
            updateActiveState(symbol);
            if (window.innerWidth < 1024) closeDrawers();
        }

        function updateActiveState(symbol) {
            document.querySelectorAll('.list-item').forEach(el => { el.classList.toggle('active', el.dataset.sym === symbol); });
        }

        function renderWatchlist(shouldLoadFirst = true) {
            const listEl = document.getElementById('watchlist');
            listEl.innerHTML = '';
            storage[currentCat].forEach(sym => {
                const div = document.createElement('div');
                div.className = 'list-item';
                div.dataset.sym = sym;
                div.innerHTML = `
                    <div class="flex-1" onclick="loadChart('${sym}')">
                        <div class="font-bold text-[16px]">${sym.split(':')[1] || sym}</div>
                        <div class="text-[10px] text-gray-600 font-mono tracking-widest uppercase">${sym.split(':')[0]}</div>
                    </div>
                    <button onclick="removeSym('${sym}', event)" class="text-gray-600 px-3 text-2xl">&times;</button>`;
                listEl.appendChild(div);
            });
            if (shouldLoadFirst && storage[currentCat].length > 0) loadChart(storage[currentCat][0]);
        }

        window.removeSym = function(sym, e) {
            e.stopPropagation();
            storage[currentCat] = storage[currentCat].filter(s => s !== sym);
            save(); renderWatchlist(false);
        };

        function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(storage)); }

        // 導航切換
        document.querySelectorAll('.nav-item').forEach(nav => {
            nav.onclick = function() {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                this.classList.add('active');
                currentCat = this.dataset.cat;
                renderWatchlist(true);
            };
        });

        // 修正搜尋邏輯
        document.getElementById('new-sym').onkeypress = function(e) {
            if (e.key === 'Enter' && this.value) {
                let s = this.value.toUpperCase();
                if (!s.includes(':')) {
                    if (currentCat === 'crypto') s = 'BINANCE:' + s;
                    else if (currentCat === 'forex') s = 'FX_IDC:' + s;
                }
                
                if(!storage[currentCat].includes(s)) {
                    storage[currentCat].push(s);
                    save();
                }
                loadChart(s);
                renderWatchlist(false);
                this.value = '';
                if (window.innerWidth < 1024) closeDrawers();
            }
        };

        function toggleDrawer(side) {
            const left = document.getElementById('left-drawer');
            const right = document.getElementById('right-drawer');
            const btns = { left: document.getElementById('btn-left'), right: document.getElementById('btn-right'), chart: document.getElementById('btn-chart') };
            Object.values(btns).forEach(b => b.classList.remove('active'));
            if (side === 'left') {
                left.classList.toggle('active'); right.classList.remove('active');
                if(left.classList.contains('active')) btns.left.classList.add('active');
                else btns.chart.classList.add('active');
            } else {
                right.classList.toggle('active'); left.classList.remove('active');
                if(right.classList.contains('active')) btns.right.classList.add('active');
                else btns.chart.classList.add('active');
            }
        }

        function closeDrawers() {
            document.getElementById('left-drawer').classList.remove('active');
            document.getElementById('right-drawer').classList.remove('active');
            document.getElementById('btn-chart').classList.add('active');
            document.getElementById('btn-left').classList.remove('active');
            document.getElementById('btn-right').classList.remove('active');
        }

        new Sortable(document.getElementById('watchlist'), {
            animation: 150, onEnd: () => {
                storage[currentCat] = Array.from(document.querySelectorAll('.list-item')).map(el => el.dataset.sym);
                save();
            }
        });

        // 頁面卸載時關閉 WebSocket
        window.addEventListener('beforeunload', () => {
            if (maxWs) maxWs.close();
        });
    </script>
</body>
</html>
